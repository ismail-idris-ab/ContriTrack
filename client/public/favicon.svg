<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark rounded square background -->
  <rect width="32" height="32" rx="7" fill="#0f0f14"/>

  <!-- Faint outer ring — represents the savings circle community -->
  <circle cx="16" cy="16" r="11.5" stroke="#d4a017" stroke-width="0.75" stroke-opacity="0.25"/>

  <!-- Bold gold arc (C shape) — the savings circle, almost complete -->
  <path d="M23.5 11.2A9 9 0 1 0 23.5 20.8"
        stroke="#d4a017" stroke-width="3.2" stroke-linecap="round"/>

  <!-- Gold dot at the arc opening — the missing member/slot -->
  <circle cx="23.5" cy="11.2" r="1.9" fill="#d4a017"/>
</svg>
